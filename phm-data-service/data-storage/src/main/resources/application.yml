server:
  port: 8103

spring:
  application:
    name: data-storage

  # 多数据源配置
  datasource:
    # 主数据源：PostgreSQL/TimescaleDB（时序数据）
    primary:
      hikari:
        jdbc-url: jdbc:postgresql://localhost:5432/phm_db
        username: phm
        password: phm123
        driver-class-name: org.postgresql.Driver
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    # 第二数据源：MySQL（文本数据）
    secondary:
      hikari:
        jdbc-url: jdbc:mysql://localhost:3306/phm_text?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
        username: phm
        password: phm123
        driver-class-name: com.mysql.cj.jdbc.Driver
        maximum-pool-size: 10
        minimum-idle: 3

  # JPA 配置（主要用于PostgreSQL）
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

  # Neo4j 配置（图数据）
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: phm123456

# 日志配置
logging:
  level:
    com.phm.storage: INFO
    org.hibernate.SQL: WARN
    org.springframework.data.neo4j: INFO
