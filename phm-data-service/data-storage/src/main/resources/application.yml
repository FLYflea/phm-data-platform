server:
  port: 8103

spring:
  application:
    name: data-storage

  # H2 内存数据库（临时方案）
  datasource:
    url: jdbc:h2:mem:phm_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Neo4j 配置
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: phm123456

  # Data Neo4j 配置
  data:
    neo4j:
      database: neo4j

# 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.phm.storage: INFO
    org.hibernate.SQL: WARN
