server:
  port: 8103

spring:
  application:
    name: data-storage

  # 多数据源配置 - 已在代码中硬编码配置
  # 详见 DataSourceConfig.java

  # JPA 配置（主要用于PostgreSQL）
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

  # Neo4j 配置（图数据）
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: phm123456

# 日志配置
logging:
  level:
    com.phm.storage: INFO
    org.hibernate.SQL: WARN
    org.springframework.data.neo4j: INFO
