services:
  # PostgreSQL + TimescaleDB (时序数据存储)
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: phm-postgres
    environment:
      POSTGRES_DB: phm_db
      POSTGRES_USER: phm
      POSTGRES_PASSWORD: phm123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
    ports:
      - "5432:5432"
    networks:
      - phm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phm -d phm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j (知识图谱存储)
  neo4j:
    image: neo4j:5.15
    container_name: phm-neo4j
    environment:
      NEO4J_AUTH: neo4j/phm123456
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - phm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  phm-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
