services:
  # PostgreSQL + TimescaleDB (时序数据存储)
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: phm-postgres
    environment:
      POSTGRES_DB: phm_db
      POSTGRES_USER: phm
      POSTGRES_PASSWORD: phm123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - phm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phm -d phm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j (知识图谱存储)
  neo4j:
    image: neo4j:5.15
    container_name: phm-neo4j
    environment:
      NEO4J_AUTH: neo4j/phm123456
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - phm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (PostgreSQL 管理界面)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: phm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@phm.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - phm-network
    restart: unless-stopped
    depends_on:
      - postgres

networks:
  phm-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  pgadmin_data: