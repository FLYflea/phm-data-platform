# PHM 数据管理平台 - 数据库服务
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: phm-postgres
    environment:
      POSTGRES_DB: phm_db
      POSTGRES_USER: phm
      POSTGRES_PASSWORD: phm123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - phm-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15
    container_name: phm-neo4j
    environment:
      NEO4J_AUTH: neo4j/phm123456
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - phm-network
    restart: unless-stopped

networks:
  phm-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
