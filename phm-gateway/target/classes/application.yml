server:
  port: 8080

spring:
  application:
    name: phm-gateway
  
  cloud:
    gateway:
      routes:
        - id: test-route
          uri: http://httpbin.org
          predicates:
            - Path=/test/**
          filters:
            - StripPrefix=1
        
        # 数据采集服务路由
        - id: collection-route
          uri: http://localhost:8101
          predicates:
            - Path=/api/collection/**
          filters:
            - StripPrefix=2
        
        # 数据计算服务路由
        - id: computation-route
          uri: http://localhost:8102
          predicates:
            - Path=/api/computation/**
          filters:
            - StripPrefix=2
        
        # 数据存储服务路由
        - id: storage-route
          uri: http://localhost:8103
          predicates:
            - Path=/api/storage/**
          filters:
            - StripPrefix=2
        
        # 数据服务层路由
        - id: service-route
          uri: http://localhost:8104
          predicates:
            - Path=/api/service/**
          filters:
            - StripPrefix=2

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always